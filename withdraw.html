<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السحب - SKG</title>

<style>
body{
background:#000;
color:#fff;
font-family:Arial;
padding:20px;
}

.box{
max-width:500px;
margin:auto;
background:#111;
padding:25px;
border-radius:14px;
border-top:3px solid gold;
}

h2{
color:gold;
text-align:center;
margin-bottom:15px;
}

label{
display:block;
margin-top:14px;
margin-bottom:6px;
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#222;
color:#fff;
}

button{
margin-top:18px;
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:gold;
color:#000;
font-weight:bold;
cursor:pointer;
}

.msg{
margin-top:14px;
text-align:center;
}

.success{
color:#22c55e;
}

.error{
color:#ef4444;
}

a{
display:block;
margin-top:20px;
text-align:center;
color:gold;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

<h2>طلب سحب</h2>

<label>اختر الشبكة</label>
<select id="network">
<option>USDT TRC20</option>
<option>USDT BEP20</option>
<option>USDT ERC20</option>
<option>BTC</option>
<option>ETH</option>
</select>

<label>عنوان المحفظة</label>
<input id="address" placeholder="اكتب عنوان محفظتك">

<label>المبلغ</label>
<input id="amount" type="number" placeholder="اكتب مبلغ السحب">

<button onclick="submitWithdraw()">إرسال طلب السحب</button>

<div id="msg" class="msg"></div>

<a href="dashboard.html">العودة للوحة المستخدم</a>

</div>

<script>

const savedUser = localStorage.getItem("skgUser")

if(!savedUser){
window.location="login.html"
}

function submitWithdraw(){

const network=document.getElementById("network").value
const address=document.getElementById("address").value
const amount=Number(document.getElementById("amount").value)
const msg=document.getElementById("msg")

msg.className="msg"
msg.textContent=""

if(!address || !amount){
msg.classList.add("error")
msg.textContent="يرجى إدخال جميع البيانات"
return
}

const history=JSON.parse(localStorage.getItem("skgHistory")||"[]")

history.unshift({

type:"سحب",
network:network,
address:address,
amount:amount,
status:"قيد المراجعة",
createdAt:new Date().toISOString()

})

localStorage.setItem("skgHistory",JSON.stringify(history))

msg.classList.add("success")
msg.textContent="تم إرسال طلب السحب بنجاح"

document.getElementById("address").value=""
document.getElementById("amount").value=""

}

</script>

</body>
</html>
