<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إنشاء حساب - SKG</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    body{
      background:#000;
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:420px;
      background:#111;
      border:1px solid #222;
      border-top:3px solid gold;
      border-radius:14px;
      padding:30px 22px;
      box-shadow:0 0 20px rgba(255,215,0,.08);
    }

    h2{
      text-align:center;
      color:gold;
      margin-bottom:20px;
      font-size:30px;
    }

    p{
      text-align:center;
      color:#ccc;
      margin-bottom:22px;
      line-height:1.7;
      font-size:14px;
    }

    label{
      display:block;
      margin-bottom:7px;
      margin-top:14px;
      color:#eee;
      font-size:14px;
    }

    input{
      width:100%;
      padding:13px;
      border:none;
      border-radius:8px;
      background:#1b1b1b;
      color:#fff;
      outline:none;
      border:1px solid #2a2a2a;
    }

    input:focus{
      border-color:gold;
    }

    button{
      width:100%;
      margin-top:22px;
      padding:14px;
      border:none;
      border-radius:8px;
      background:gold;
      color:#000;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#ffd84d;
    }

    .links{
      margin-top:18px;
      text-align:center;
    }

    .links a{
      color:gold;
      text-decoration:none;
      font-size:14px;
    }

    .note{
      margin-top:16px;
      background:#181818;
      border-right:3px solid gold;
      padding:12px;
      border-radius:8px;
      color:#ccc;
      line-height:1.7;
      font-size:13px;
    }

    .message{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      line-height:1.6;
    }

    .success{
      color:#22c55e;
    }

    .error{
      color:#ef4444;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>إنشاء حساب</h2>
    <p>أنشئ حسابك التجريبي داخل منصة SKG باستخدام البريد الإلكتروني.</p>

    <form id="registerForm">
      <label>الاسم الكامل</label>
      <input id="fullName" type="text" placeholder="اكتب اسمك الكامل" required />

      <label>البريد الإلكتروني</label>
      <input id="email" type="email" placeholder="example@email.com" required />

      <label>كلمة المرور</label>
      <input id="password" type="password" placeholder="اكتب كلمة المرور" required />

      <label>تأكيد كلمة المرور</label>
      <input id="confirmPassword" type="password" placeholder="أعد كتابة كلمة المرور" required />

      <button type="submit">إنشاء الحساب</button>
    </form>

    <div id="message" class="message"></div>

    <div class="links">
      <a href="login.html">لديك حساب بالفعل؟ تسجيل الدخول</a>
    </div>

    <div class="note">
      هذه واجهة تجريبية للمشروع، والتسجيل الآن مربوط بسيرفر SKG API التجريبي.
    </div>
  </div>

  <script>
    const API_URL = "https://skg-api.onrender.com";

    const form = document.getElementById("registerForm");
    const messageBox = document.getElementById("message");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      messageBox.className = "message";
      messageBox.textContent = "";

      if (!fullName || !email || !password || !confirmPassword) {
        messageBox.classList.add("error");
        messageBox.textContent = "يرجى تعبئة كل الحقول.";
        return;
      }

      if (password !== confirmPassword) {
        messageBox.classList.add("error");
        messageBox.textContent = "كلمتا المرور غير متطابقتين.";
        return;
      }

      try {
        const response = await fetch(API_URL + "/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            fullName: fullName,
            email: email,
            password: password
          })
        });

        const data = await response.json();

        if (data.ok) {
          messageBox.classList.add("success");
          messageBox.textContent = "تم إنشاء الحساب بنجاح ✅ سيتم تحويلك إلى صفحة الدخول.";

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);
        } else {
          messageBox.classList.add("error");
          messageBox.textContent = data.error || "حدث خطأ أثناء إنشاء الحساب.";
        }
      } catch (error) {
        messageBox.classList.add("error");
        messageBox.textContent = "تعذر الاتصال بالسيرفر. تأكد أن SKG API يعمل.";
      }
    });
  </script>

</body>
</html>
