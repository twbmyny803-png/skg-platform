<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الأدمن - SKG</title>

<style>

body{
background:#000;
color:#fff;
font-family:Arial;
padding:30px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
border-bottom:2px solid gold;
padding-bottom:10px;
}

h1{
color:gold;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
border-top:3px solid gold;
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
background:#222;
border:none;
color:white;
border-radius:5px;
}

button{
padding:10px 15px;
background:gold;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:center;
}

th{
color:gold;
}

.status{
color:#22c55e;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>لوحة تحكم الأدمن</h1>
<a href="index.html" style="color:gold">العودة للموقع</a>
</header>

<div class="container">

<div class="card">

<h3>إضافة رصيد لمستخدم</h3>

<input type="text" placeholder="البريد الإلكتروني">

<input type="number" placeholder="المبلغ">

<button>إضافة رصيد</button>

</div>

<div class="card">

<h3>إدارة المستخدمين</h3>

<table>

<thead>
<tr>
<th>المستخدم</th>
<th>الرصيد</th>
<th>الحالة</th>
<th>إجراء</th>
</tr>
</thead>

<tbody>

<tr>
<td>user1@email.com</td>
<td>$2500</td>
<td class="status">نشط</td>
<td>
<button>حظر</button>
</td>
</tr>

<tr>
<td>user2@email.com</td>
<td>$1200</td>
<td class="status">نشط</td>
<td>
<button>حظر</button>
</td>
</tr>

<tr>
<td>user3@email.com</td>
<td>$800</td>
<td class="status">نشط</td>
<td>
<button>حظر</button>
</td>
</tr>

</tbody>

</table>

</div>

<div class="card">

<h3>طلبات السحب</h3>

<table>

<thead>
<tr>
<th>المستخدم</th>
<th>المبلغ</th>
<th>الحالة</th>
<th>إجراء</th>
</tr>
</thead>

<tbody>

<tr>
<td>user2@email.com</td>
<td>$200</td>
<td>قيد المراجعة</td>
<td>
<button>قبول</button>
<button>رفض</button>
</td>
</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
